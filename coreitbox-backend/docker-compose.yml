version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: coreitbox-postgres

    restart: always

    environment:
      POSTGRES_DB: coreitbox
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio

    container_name: coreitbox-minio

    restart: always

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: coreitbox-backend

    restart: always

    depends_on:
      - postgres
      - minio

    env_file:
      - .env

    ports:
      - "3100:3100"

volumes:
  postgres_data:
  minio_data: