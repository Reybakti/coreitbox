services:

  postgres:
    image: postgres:16
    container_name: coreitbox-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: coreitbox
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio

    container_name: coreitbox-minio

    restart: unless-stopped

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./coreitbox-backend

    container_name: coreitbox-backend

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

      minio:
        condition: service_started

    env_file:
      - ./coreitbox-backend/.env

    ports:
      - "3100:3100"

  frontend:
    build:
      context: ./coreitbox-web

    container_name: coreitbox-web

    restart: unless-stopped

    depends_on:
      - backend

    env_file:
      - ./coreitbox-web/.env.local

    ports:
      - "3000:3000"

volumes:
  postgres_data:
  minio_data: